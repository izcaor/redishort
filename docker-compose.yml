version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redishort_redis
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: redishort_api
    restart: always
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./redishort.db
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    depends_on:
      - redis

  worker:
    build: .
    container_name: redishort_worker
    restart: always
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=sqlite:///./redishort.db
    volumes:
      - .:/app
    command: ["celery", "-A", "app.celery_app", "worker", "--loglevel=info"]
    depends_on:
      - redis
      - api
